<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ThreatShield{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-shield-lock-fill text-danger me-2"></i>ThreatShield
    </a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}"
             href="/">
            <i class="bi bi-search me-1"></i>Scan
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/monitor' %}active{% endif %}"
             href="/monitor">
            <i class="bi bi-activity me-1"></i>Monitor
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/logs' %}active{% endif %}"
             href="/logs">
            <i class="bi bi-database-lock me-1"></i>Blockchain Logs
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer class="text-center py-3 mt-4">
  <small class="text-muted">
    ThreatShield &mdash; AI + Blockchain Threat Detection
  </small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
